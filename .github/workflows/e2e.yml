name: SchedulePress E2E Tests

on:
  workflow_dispatch:
    inputs:
      test_pattern:
        description: "Playwright test file pattern (e.g. tests/06-*.spec.ts). Leave blank to run all."
        required: false
        default: ""

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    env:
      WP_BASE_URL:   http://localhost:8080
      WP_ADMIN_USER: admin
      WP_ADMIN_PASS: admin

    steps:
      # ── Checkout e2e repository ─────────────────────────────────────────────
      - name: Checkout e2e repository
        uses: actions/checkout@v4

      # ── (Optional) Checkout free plugin from private/org repo ───────────────
      # Add a PLUGIN_REPO_TOKEN secret in repo settings for private repos.
      # If the checkout fails (missing token, inaccessible repo), the free
      # plugin is installed from WordPress.org automatically by wp-setup.sh.
      - name: Checkout SchedulePress (free) — optional
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/wp-scheduled-posts
          path: plugin-free
          token: ${{ secrets.PLUGIN_REPO_TOKEN || github.token }}
        continue-on-error: true

      # ── (Optional) Checkout PRO plugin ─────────────────────────────────────
      # Requires PLUGIN_REPO_TOKEN secret and access to the pro repo.
      # If unavailable, tests run in free-only mode (05-pro-features may skip).
      - name: Checkout SchedulePress PRO — optional
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/wp-scheduled-posts-pro
          path: plugin-pro
          token: ${{ secrets.PLUGIN_REPO_TOKEN || github.token }}
        continue-on-error: true

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      # ── Playwright browsers ─────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Make scripts executable ─────────────────────────────────────────────
      - name: Make helper scripts executable
        run: chmod +x docker/wp-setup.sh docker/wait-for-wp.sh

      # ── Start Docker stack (CI override removes plugin volume mounts) ───────
      - name: Start Docker Compose stack
        run: |
          # Resolve plugin paths: use checked-out source if present, else empty placeholder
          FREE_PATH="${{ github.workspace }}/plugin-free"
          PRO_PATH="${{ github.workspace }}/plugin-pro"

          # docker-compose.ci.yml overrides strip the plugin mounts entirely;
          # wp-setup.sh installs the free plugin from WordPress.org automatically.
          PLUGIN_FREE_PATH="${FREE_PATH}" \
          PLUGIN_PRO_PATH="${PRO_PATH}" \
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            up -d db wordpress

          echo "Docker containers started."

      # ── Wait for WordPress HTTP readiness ───────────────────────────────────
      - name: Wait for WordPress to be ready
        run: bash docker/wait-for-wp.sh http://localhost:8080 60

      # ── Wait for MySQL to be fully healthy before running wpcli ───────────
      # `docker compose run` does NOT wait for service_healthy conditions,
      # so we poll the db container's health status explicitly.
      - name: Wait for MySQL to be healthy
        run: |
          echo "Waiting for MySQL container to be healthy..."
          for i in $(seq 1 40); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' wpsp_db 2>/dev/null || echo "missing")
            if [ "$STATUS" = "healthy" ]; then
              echo "MySQL is healthy (attempt $i)"; exit 0
            fi
            echo "  Attempt $i/40: status=$STATUS — waiting 5s..."
            sleep 5
          done
          echo "MySQL did not become healthy after 200s"
          docker inspect wpsp_db || true
          exit 1

      # ── Run WP-CLI setup ────────────────────────────────────────────────────
      - name: Run WordPress setup via WP-CLI
        run: |
          PLUGIN_FREE_PATH="${{ github.workspace }}/plugin-free" \
          PLUGIN_PRO_PATH="${{ github.workspace }}/plugin-pro" \
          docker compose -f docker-compose.yml -f docker-compose.ci.yml \
            run --rm wpcli
          echo "WordPress setup complete."

      # ── Final readiness check after wp-setup.sh ────────────────────────────
      # Follow redirects (-L) so WordPress login page (which may 302 briefly)
      # resolves to 200 once WordPress is fully installed and configured.
      - name: Final WordPress readiness check
        run: |
          for i in $(seq 1 24); do
            STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" http://localhost:8080/wp-login.php)
            if [ "$STATUS" = "200" ]; then
              echo "WordPress ready (HTTP 200 after redirects)"; exit 0
            fi
            echo "Attempt $i/24: HTTP $STATUS — waiting 5s..."
            sleep 5
          done
          echo "WordPress not ready after 120s"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs wordpress
          exit 1

      # ── Run Playwright tests ────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: |
          PATTERN="${{ github.event.inputs.test_pattern }}"
          if [ -n "${PATTERN}" ]; then
            npx playwright test ${PATTERN} --reporter=github,html
          else
            npx playwright test --reporter=github,html
          fi
        env:
          WP_BASE_URL:   http://localhost:8080
          WP_ADMIN_USER: admin
          WP_ADMIN_PASS: admin
          CI: "true"

      # ── Upload HTML report (always) ─────────────────────────────────────────
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      # ── Upload traces/screenshots/videos (on failure) ───────────────────────
      - name: Upload test result artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      # ── Docker logs on failure ──────────────────────────────────────────────
      - name: Dump Docker logs on failure
        if: failure()
        run: |
          echo "=== WordPress container logs ==="
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs wordpress
          echo "=== MySQL container logs ==="
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs db

      # ── Teardown ────────────────────────────────────────────────────────────
      - name: Stop Docker Compose stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
