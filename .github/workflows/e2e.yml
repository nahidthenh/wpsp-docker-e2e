name: SchedulePress E2E Tests

on:
  workflow_dispatch:
    inputs:
      test_pattern:
        description: "Test file pattern (e.g. tests/03-advanced/*.spec.ts). Leave blank to run all."
        required: false
        default: ""
      free_branch:
        description: "Branch for wp-scheduled-posts (free). Leave blank for default branch."
        required: false
        default: ""
      pro_branch:
        description: "Branch for wp-scheduled-posts-pro (PRO). Leave blank for default branch."
        required: false
        default: ""

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      WP_BASE_URL:   http://localhost:8080
      WP_ADMIN_USER: admin
      WP_ADMIN_PASS: admin

    steps:
      - name: Checkout e2e repository
        uses: actions/checkout@v4

      # Plugin repos are public on WPDevelopers. PLUGIN_REPO_TOKEN is only
      # needed if either repo is private.
      - name: Checkout SchedulePress free plugin
        uses: actions/checkout@v4
        with:
          repository: WPDevelopers/wp-scheduled-posts
          path: plugin-free
          ref: ${{ github.event.inputs.free_branch || '' }}
          token: ${{ secrets.PLUGIN_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Checkout SchedulePress PRO plugin
        uses: actions/checkout@v4
        with:
          repository: WPDevelopers/wp-scheduled-posts-pro
          path: plugin-pro
          ref: ${{ github.event.inputs.pro_branch || '' }}
          token: ${{ secrets.PLUGIN_REPO_TOKEN || github.token }}
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Make helper scripts executable
        run: chmod +x docker/wp-setup.sh docker/wait-for-wp.sh

      # PLUGIN_FREE_PATH / PLUGIN_PRO_PATH point docker-compose.yml bind mounts
      # at the checked-out plugin dirs. If a checkout failed, Docker Compose
      # creates the path as an empty dir and wp-setup.sh installs from WP.org.
      - name: Start Docker Compose stack
        run: |
          PLUGIN_FREE_PATH="${{ github.workspace }}/plugin-free" \
          PLUGIN_PRO_PATH="${{ github.workspace }}/plugin-pro" \
          docker compose up -d db wordpress

      - name: Wait for WordPress to be ready
        run: bash docker/wait-for-wp.sh http://localhost:8080 60

      # docker compose run does not honour service_healthy depends_on conditions,
      # so we poll the db container health status before running wpcli.
      - name: Wait for MySQL to be healthy
        run: |
          for i in $(seq 1 40); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' wpsp_db 2>/dev/null || echo "missing")
            [ "$STATUS" = "healthy" ] && echo "MySQL healthy (attempt $i)" && exit 0
            echo "  Attempt $i/40: $STATUS — waiting 5s..."
            sleep 5
          done
          echo "MySQL not healthy after 200s"; docker inspect wpsp_db || true; exit 1

      - name: Run WordPress setup via WP-CLI
        run: |
          PLUGIN_FREE_PATH="${{ github.workspace }}/plugin-free" \
          PLUGIN_PRO_PATH="${{ github.workspace }}/plugin-pro" \
          docker compose run --rm wpcli

      # After wp-setup.sh installs WordPress, wp-login.php must return HTTP 200.
      - name: Final WordPress readiness check
        run: |
          for i in $(seq 1 24); do
            STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" http://localhost:8080/wp-login.php)
            [ "$STATUS" = "200" ] && echo "WordPress ready" && exit 0
            echo "  Attempt $i/24: HTTP $STATUS — waiting 5s..."
            sleep 5
          done
          echo "WordPress not ready after 120s"; docker compose logs wordpress; exit 1

      - name: Pre-create auth state placeholder
        run: |
          mkdir -p playwright/.auth
          echo '{"cookies":[],"origins":[]}' > playwright/.auth/admin.json

      - name: Run Playwright E2E tests
        env:
          SLACK_BOT_USER_OAUTH_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:           ${{ secrets.SLACK_CHANNEL_ID }}
          PAGES_URL:                  "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        run: |
          PATTERN="${{ github.event.inputs.test_pattern }}"
          if [ -n "$PATTERN" ]; then
            # Always run auth setup first, then run specified tests without re-running setup
            npx playwright test tests/auth.setup.ts --project=setup
            npx playwright test $PATTERN --project=chromium --no-deps
          else
            npx playwright test
          fi

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: playwright-report/

      - name: Deploy report to GitHub Pages
        uses: actions/deploy-pages@v4
        if: always()
        id: deploy-pages
        continue-on-error: true

      - name: Write report URL to job summary
        if: always()
        run: |
          echo "## Playwright Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **[View HTML Report](${{ steps.deploy-pages.outputs.page_url }})**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run \`#${{ github.run_number }}\` — triggered by \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload test result artifacts (traces, screenshots, videos)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Dump Docker logs on failure
        if: failure()
        run: |
          docker compose logs wordpress
          docker compose logs db

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down -v
